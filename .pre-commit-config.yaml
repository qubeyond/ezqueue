repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && uv run ruff check src/ tests/'
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run ruff format src/ tests/ --check'
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-unit
        name: pytest unit
        entry: bash -c 'cd backend && uv run pytest tests/unit/ -q'
        language: system
        pass_filenames: false
        always_run: true
