services:
  postgres:
    image: postgres:16-alpine
    container_name: queue_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: queue_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queue_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env
      - ./backend/.env
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: queue_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:5173"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
