services:
  redis:
    image: redis:7-alpine
    container_name: queue_redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_queue_data:/data
    # Настройка сброса памяти на диск для сохранности при перезагрузках
    command: redis-server --appendonly yes 

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queue_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redis_queue_data: